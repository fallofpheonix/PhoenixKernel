version: "3.8"

services:
  app:
    build: .
    container_name: project_app
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - db
    volumes:
      - ./src:/app/src

  db:
    image: postgres:16
    container_name: project_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: project_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

